name: Run all JS files
on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: '30 18 * * *'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Run all JS files
      run: |
        for file in *.js; do
          echo "Running $file..."
          node "$file"
        done
